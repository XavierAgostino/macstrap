format = """
$directory$git_branch$git_status
$character"""

right_format = ""

add_newline = false

palette = "vesper"

# Vesper color language (see docs/COLORS.md):
#   lavender = paths/structure   pink = active accent/branch   green = success
#   peach = docs/attention   red = errors   muted = metadata   fg = default text
[palettes.vesper]
bg = "#101010"
fg = "#ffffff"
white = "#ffffff"
muted = "#8a8a8a"
gray = "#8a8a8a"
lavender = "#a8a0cc"
lavender_dim = "#8f89aa"
pink = "#d996c8"
pink_dim = "#c892ab"
green = "#8fb59c"
peach = "#e0b18f"
red = "#f4777f"

[directory]
style = "lavender"
truncation_length = 0
truncate_to_repo = false
format = "[$path]($style)"
home_symbol = "~"
read_only = " ro"
read_only_style = "red"

[git_branch]
style = "muted"
format = "  [$branch]($style)"
truncation_length = 28
truncation_symbol = "…"

[git_state]
style = "lavender_dim"
format = " [$state( $progress_current/$progress_total)]($style)"

[git_status]
style = "lavender_dim"
format = "[$all_status$ahead_behind]($style)"
conflicted = " !${count}"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = " ?${count}"
stashed = " s${count}"
modified = " x${count}"
staged = " +${count}"
renamed = " »${count}"
deleted = " -${count}"

[character]
success_symbol = "[❯](pink_dim)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](pink_dim)"

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[docker_context]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[package]
disabled = true

[cmd_duration]
disabled = false
min_time = 1200
format = "  [${duration}](muted)"

[time]
disabled = true

[username]
disabled = true

[hostname]
disabled = true
