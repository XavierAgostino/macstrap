name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (shell + actions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck bin/macstrap scripts/*.sh scripts/hooks/pre-commit install.sh
      - name: shfmt
        run: |
          curl -fsSL -o /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          chmod +x /tmp/shfmt
          /tmp/shfmt -i 2 -ci -d bin/macstrap scripts/*.sh scripts/hooks/pre-commit install.sh
      - name: actionlint
        run: |
          curl -fsSL -o download-actionlint.bash \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash
          bash download-actionlint.bash
          ./actionlint -color

  markdown:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli
      - run: markdownlint README.md CHANGELOG.md "docs/**/*.md" "ai/*.md"

  render:
    name: chezmoi render (${{ matrix.profile }})
    runs-on: macos-latest
    strategy:
      matrix:
        profile: [personal, work]
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: brew install chezmoi
      - name: Seed ${{ matrix.profile }} config and dry-run apply
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.toml <<EOF
          [data]
              profile = "${{ matrix.profile }}"
              name = "CI User"
              email = "ci@example.com"
              githubUser = "ci"
              signingKey = ""
              workEmail = ""
              workName = ""
              workDir = ""
              workSigningKey = ""
          EOF
          chezmoi apply --source="$PWD" --dry-run --verbose
      - name: Validate Brewfiles parse
        run: |
          for f in brew/Brewfile.*; do
            echo "== $f =="
            brew bundle list --file="$f" >/dev/null
          done
