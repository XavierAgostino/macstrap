name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: Shellcheck scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint
        run: shellcheck scripts/*.sh scripts/hooks/pre-commit

  chezmoi:
    name: chezmoi render + Brewfile parse
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: brew install chezmoi
      - name: Seed test config (no interactive prompts) and dry-run apply
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.toml <<'EOF'
          [data]
              profile = "personal"
              name = "CI User"
              email = "ci@example.com"
              githubUser = "ci"
              signingKey = ""
              workEmail = ""
              workName = ""
              workDir = ""
              workSigningKey = ""
          EOF
          chezmoi apply --source="$PWD" --dry-run --verbose
      - name: Validate Brewfiles parse
        run: |
          for f in brew/Brewfile.*; do
            echo "== $f =="
            brew bundle list --file="$f" >/dev/null
          done
