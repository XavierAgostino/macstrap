name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (shell + actions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck -x bin/macstrap scripts/*.sh scripts/lib/*.sh demo/scripts/*.sh demo/record.sh scripts/hooks/pre-commit install.sh scripts/install-binary.sh
      - name: shfmt
        run: |
          curl -fsSL -o /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          chmod +x /tmp/shfmt
          /tmp/shfmt -i 2 -ci -d bin/macstrap scripts/*.sh scripts/lib/*.sh demo/scripts/*.sh demo/record.sh scripts/hooks/pre-commit install.sh scripts/install-binary.sh
      - name: catalog hygiene (no core dupes, well-formed rows)
        run: bash scripts/check-catalog.sh
      - name: actionlint
        run: |
          curl -fsSL -o download-actionlint.bash \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash
          bash download-actionlint.bash
          ./actionlint -color

  markdown:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli
      - run: markdownlint README.md CHANGELOG.md "docs/**/*.md" "ai/*.md" "demo/**/*.md"

  render:
    name: chezmoi render (${{ matrix.profile }})
    runs-on: macos-latest
    strategy:
      matrix:
        profile: [personal, work]
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: brew install chezmoi
      - name: Seed ${{ matrix.profile }} config and dry-run apply
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.toml <<EOF
          [data]
              profile = "${{ matrix.profile }}"
              name = "CI User"
              email = "ci@example.com"
              githubUser = "ci"
              signingKey = ""
              workEmail = ""
              workName = ""
              workDir = ""
              workSigningKey = ""
          EOF
          chezmoi apply --source="$PWD" --dry-run --verbose
      - name: Validate Brewfiles parse
        run: |
          for f in brew/Brewfile.*; do
            echo "== $f =="
            brew bundle list --file="$f" >/dev/null
          done

  contracts:
    name: JSON contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every --json contract is valid JSON with the right schema
        run: |
          set -euo pipefail
          export DOTFILES_DIR="$PWD"
          bash scripts/dev-doctor.sh --json     | jq -e '.schema=="macstrap.doctor/v1" and (.checks|type)=="array"'
          bash scripts/apps.sh --list --json    | jq -e '.schema=="macstrap.catalog/v1" and .catalog=="apps"'
          bash scripts/cli.sh --list --json     | jq -e '.schema=="macstrap.catalog/v1" and .catalog=="cli"'
          bash scripts/apps.sh cursor --json    | jq -e '.schema=="macstrap.plan/v1"'
          bash scripts/cli.sh backend --json    | jq -e '.schema=="macstrap.plan/v1"'
          bash scripts/report.sh --json         | jq -e '.schema=="macstrap.report/v1"'
          bash scripts/security-check.sh --json | jq -e '.schema=="macstrap.security/v1"'

  go:
    name: Go (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        # The engine tests shell out to the scripts, exercising the Go/shell seam.
        run: DOTFILES_DIR="$PWD" go test ./...

  catalog:
    name: Catalog formulas resolve
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every apps/cli catalog entry must exist in Homebrew
        run: bash scripts/check-catalog.sh --online
